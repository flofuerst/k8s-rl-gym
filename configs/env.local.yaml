namespace: default
deployments:
  - nginx-demo
  - nginx-worker
min_replicas: 1
max_replicas: 3
metrics:
  - desired_replicas
  - ready_replicas
  - available_replicas
  - unavailable_replicas
  - pod_count
  - cpu_usage_millicores_per_pod
  - memory_usage_mib_per_pod
step_wait_seconds: 2.0
max_steps: 10
reward: readiness
